name: CI

on:
    pull_request:
    push:
        branches: [main]

jobs:
    lint:
        name: Lint check
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: npm/action-setup@v3
              with:
                  version: 10
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
            - run: npm install --frozen-lockfile
            - run: npm lint

    format:
        name: Format checks
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: npm/action-setup@v3
              with:
                  version: 10
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
            - run: npm install --frozen-lockfile
            - run: npm format --check

    typecheck:
        name: Typechecks
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: npm/action-setup@v3
              with:
                  version: 10
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
            - run: npm install --frozen-lockfile
            - run: npm typecheck

    test:
        name: Unit Tests
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: npm/action-setup@v3
              with:
                  version: 10
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
            - run: npm install --frozen-lockfile
            - run: npm test:run

    build:
        name: Build
        needs: [lint, format, typecheck, test]
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: npm/action-setup@v3
              with:
                  version: 10
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
            - run: npm install --frozen-lockfile
            - run: npm build
