name: CI

on:
    pull_request:
    push:
        branches: [main]

jobs:
    checks:
        name: Lint, Format, Typecheck, Tests
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci --include=optional

            - name: Lint
              run: npm run lint

            - name: Format check
              run: npx prettier . --check

            - name: Typecheck
              run: npm run typecheck

            - name: Unit tests
              run: npm run test:run

    build:
        name: Build
        needs: checks
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci --include=optional

            - name: Build
              run: npm run build
